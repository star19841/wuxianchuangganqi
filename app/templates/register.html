{% extends "base.html" %}

{% block body_class %}auth-body{% end %}

{% block body %}
<div class="auth-shell ops-auth-shell">
    <div class="auth-card ops-auth-card auth-card-register">
        <section class="auth-brand-panel auth-brand-panel-soft ops-auth-brand-panel">
            <div class="auth-brand-top ops-auth-brand-top">CdutAgentOS</div>
            <div class="auth-brand-content ops-auth-brand-content">
                <span class="auth-kicker">账号开通</span>
                <h1>创建后台用户</h1>
                <p>按任务一要求录入唯一用户名、手机号与加密密码，完成后台账号初始化。</p>
                <div class="auth-brand-pills">
                    <span>用户名唯一</span>
                    <span>手机号唯一</span>
                    <span>密码加密存储</span>
                </div>
            </div>
            <div class="ops-auth-grid">
                <div class="ops-auth-grid-box"></div>
                <div class="ops-auth-grid-box"></div>
                <div class="ops-auth-grid-box"></div>
                <div class="ops-auth-grid-box"></div>
            </div>
        </section>

        <section class="auth-form-panel ops-auth-form-panel">
            <div class="auth-form-wrap">
                <div class="auth-heading ops-auth-heading">
                    <h2>注册账号</h2>
                    <p>注册成功后返回登录页继续使用统一后台系统。</p>
                </div>

                {% if error %}
                <div class="layui-panel auth-alert auth-alert-error">
                    <i class="layui-icon layui-icon-close-fill"></i>
                    <span>{{ error }}</span>
                </div>
                {% end %}

                <form class="layui-form auth-form auth-form-register" method="post" action="/auth/register">
                    {% module xsrf_form_html() %}
                    <div class="layui-form-item">
                        <label class="auth-label">用户名</label>
                        <input class="layui-input auth-input" name="username" value="{{ form_data.get('username', '') }}" placeholder="请输入用户名">
                    </div>

                    <div class="layui-form-item">
                        <label class="auth-label">显示名</label>
                        <input class="layui-input auth-input" name="display_name" value="{{ form_data.get('display_name', '') }}" placeholder="请输入显示名">
                    </div>

                    <div class="layui-form-item">
                        <label class="auth-label">手机号</label>
                        <input class="layui-input auth-input" name="phone" value="{{ form_data.get('phone', '') }}" placeholder="请输入手机号">
                    </div>

                    <div class="layui-form-item">
                        <label class="auth-label">登录密码</label>
                        <input class="layui-input auth-input" name="password" type="password" placeholder="请输入密码">
                    </div>

                    <div class="layui-form-item">
                        <label class="auth-label">确认密码</label>
                        <input class="layui-input auth-input" name="password2" type="password" placeholder="请再次输入密码">
                    </div>

                    <div class="auth-actions-row auth-actions-row-register">
                        <a href="/auth/login">返回登录</a>
                    </div>

                    <button class="layui-btn layui-btn-fluid auth-submit" type="submit">提交注册</button>
                </form>
            </div>
        </section>
    </div>
</div>
{% end %}
